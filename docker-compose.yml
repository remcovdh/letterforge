services:
  letterforge:
    build: .
    volumes:
      # Share the host Docker daemon so the app can spawn sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount your current working directory as /work (holds input images + output)
      - ${WORK_DIR:-.}:/work
    working_dir: /work
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LETTERFORGE_OUTPUT_DIR=/work/letterforge_output
      - LETTERFORGE_SANDBOX__AUTO_BUILD=true
